<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Danh sách xe</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <h1>Danh sách xe</h1>

        <!-- Ô nhập tìm kiếm -->
        <input type="text" id="searchInput" placeholder="Nhập tên xe">
        <button onclick="searchCar()">Tìm kiếm</button>

        <!-- Bảng hiển thị danh sách xe -->
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên Xe</th>
                    <th>Giá</th>
                    <th>Tốc độ tối đa</th>
                    <th>Gia tốc</th>
                </tr>
            </thead>
            <tbody id="carTableBody">
                <!-- Dữ liệu xe sẽ được load vào đây -->
            </tbody>
        </table>

        <!-- Kết nối với file JavaScript -->
        <script src="../js/script.js"></script>
    </body>
</html>
